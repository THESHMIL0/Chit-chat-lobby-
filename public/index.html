<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chit Chat - Web Lite</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* PURE, FAST, LITE CSS */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b141a; color: #e9edef; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        
        /* Landing Page Styles */
        #landing-page { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; background: radial-gradient(circle at top, #202c33 0%, #0b141a 70%); }
        .logo { font-size: 70px; margin-bottom: 10px; animation: bounce 2s infinite; }
        h1 { color: #00a884; font-size: 36px; margin-bottom: 10px; }
        p { color: #8696a0; max-width: 400px; margin-bottom: 30px; font-size: 16px; line-height: 1.5; }
        
        .btn { padding: 15px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; max-width: 280px; margin-bottom: 15px; transition: transform 0.1s; text-align: center; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #00a884, #02d1a3); color: white; border: none; box-shadow: 0 10px 20px rgba(0, 168, 132, 0.3); }
        .btn-secondary { background: #202c33; color: #53bdeb; border: 2px solid #53bdeb; }

        /* Chat Lite Styles */
        #chat-interface { display: none; flex-direction: column; height: 100dvh; width: 100%; max-width: 800px; margin: 0 auto; background: #0b141a; border-left: 1px solid #202c33; border-right: 1px solid #202c33; }
        .chat-header { background: #202c33; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #3b4a54; }
        .chat-header h2 { font-size: 18px; color: #e9edef; }
        .chat-header span { font-size: 12px; color: #00a884; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 4px; }
        .msg-other { align-self: flex-start; background: #202c33; border-bottom-left-radius: 4px; }
        .msg-sender { font-size: 12px; font-weight: bold; color: #53bdeb; margin-bottom: 4px; display: block; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.6); float: right; margin-left: 15px; margin-top: 5px; }

        .chat-input-area { padding: 15px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; padding: 15px; border-radius: 25px; border: none; background: #2a3942; color: white; font-size: 16px; outline: none; }
        #send-btn { background: #00a884; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        #send-btn:active { transform: scale(0.9); }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="logo">😸</div>
        <h1>Chit Chat</h1>
        <p>Experience the ultimate chatting app. Connect via the lightweight web version, or download the app for Voice Notes, Biometric Locks, and Themes!</p>
        
        <a href="https://github.com/YOUR-USERNAME/YOUR-REPO/releases/download/v1.0/ChitChat.apk" class="btn btn-primary">📥 Download Full App (Android)</a>
        
        <button id="join-lite-btn" class="btn btn-secondary">🌐 Join Web Chat (Lite)</button>
    </div>

    <div id="chat-interface">
        <div class="chat-header">
            <h2>Lobby 😸 <br><span>Lite Web Version</span></h2>
        </div>
        
        <ul id="messages"></ul>
        
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script>
        const socket = io('https://chit-chat-lobby.onrender.com');
        
        let currentUser = "Web Guest " + Math.floor(Math.random() * 1000);
        let userAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${currentUser}`;

        const landingPage = document.getElementById('landing-page');
        const chatInterface = document.getElementById('chat-interface');
        const msgList = document.getElementById('messages');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        // Switch from Landing to Chat
        document.getElementById('join-lite-btn').addEventListener('click', () => {
            const namePrompt = prompt("Enter your display name:", currentUser);
            if (namePrompt && namePrompt.trim() !== '') {
                currentUser = namePrompt.trim();
                userAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${currentUser}`;
            }

            landingPage.style.display = 'none';
            chatInterface.style.display = 'flex';

            // Connect to main Lobby
            socket.emit('join room', { 
                roomId: 'lobby', 
                password: '', 
                user: { name: currentUser, avatar: userAvatar, about: 'Using Web Lite', color: '#005c4b' }, 
                isReconnect: false 
            });
        });

        // Handle incoming history
        socket.on('chat history', (data) => {
            msgList.innerHTML = '';
            data.history.forEach(msg => renderMessage(msg));
        });

        // Handle live messages
        socket.on('chat message', (msg) => {
            renderMessage(msg);
        });

        // Render message function
        function renderMessage(data) {
            // Ignore system/game messages in the lite version to keep it simple
            if (data.type === 'system' || data.type === 'game_session') return;

            const li = document.createElement('li');
            const isMe = data.user === currentUser;
            li.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;

            let textContent = data.text || "📷 [Attachment sent from App]";
            
            li.innerHTML = `
                ${!isMe ? `<span class="msg-sender">${data.user}</span>` : ''}
                ${escapeHTML(textContent)}
                <span class="msg-time">${data.time}</span>
            `;
            
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        }

        // Send logic
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            socket.emit('chat message', {
                user: currentUser,
                avatar: userAvatar,
                color: '#005c4b',
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                isGhost: false
            });

            input.value = '';
            input.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Safe HTML escaper
        function escapeHTML(str) { 
            const div = document.createElement('div'); 
            div.textContent = str; 
            return div.innerHTML; 
        }
    </script>
</body>
</html>
