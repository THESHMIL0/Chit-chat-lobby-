<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chit Chat Lobby</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <h2>Chit Chat Lobby 😸</h2>
        <form id="login-form">
            <input type="text" id="username-input" placeholder="Enter your name..." required autocomplete="off" />
            <button type="submit" id="join-btn">Join Chat</button>
        </form>
    </div>

    <div id="chat-container" class="hidden">
        <div id="header">
            <span>Chit Chat Lobby 😸</span>
            <div>
                <button id="clear-btn" style="background: none; border: none; font-size: 20px; cursor: pointer; margin-right: 10px;">🗑️</button>
            </div>
        </div>
        
        <div id="active-users">Online: <span id="user-list"></span></div>
        <ul id="messages"></ul>
        <div id="typing-indicator"></div>
        
        <form id="chat-form" action="">
            <input id="input" autocomplete="off" placeholder="Type a message..." required />
            <button id="send-btn">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
