<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chit Chat Lobby</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
</head>
<body>
    <div id="login-screen">
        <h2>Chit Chat Lobby 😸</h2>
        <form id="login-form">
            <input type="text" id="username-input" placeholder="Enter your name..." required autocomplete="off" />
            <button type="submit" id="join-btn">Join Chat</button>
        </form>
    </div>

    <div id="chat-container" class="hidden">
        <div id="header">
            <span>Chit Chat Lobby 😸</span>
            <div>
                <button id="theme-toggle" style="background: none; border: none; font-size: 20px; cursor: pointer; margin-right: 15px;">🌙</button>
                <button id="clear-btn" style="background: none; border: none; font-size: 20px; cursor: pointer;">🗑️</button>
            </div>
        </div>
        
        <div id="active-users">Online: <span id="user-list"></span></div>
        <ul id="messages"></ul>
        <div id="typing-indicator"></div>
        
        <emoji-picker id="emoji-picker" class="hidden"></emoji-picker>

        <div id="reply-preview-container" class="hidden">
            <div id="reply-preview-text"></div>
            <button type="button" id="cancel-reply-btn">❌</button>
        </div>

        <form id="chat-form" action="">
            <button type="button" id="emoji-btn" style="background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 10px;">😀</button>
            <input id="input" autocomplete="off" placeholder="Type a message..." required />
            <button id="send-btn">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
